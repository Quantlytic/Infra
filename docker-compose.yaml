version: '3.8'

services:
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    hostname: kafka
    container_name: kafka
    ports:
      - "9092:9092"
      - "9101:9101"
    env_file:
      - .env
    volumes:
      - kafka-data:/tmp/kraft-combined-logs
    networks:
      - quantlytic-network
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 5

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks:
      - quantlytic-network

  minio:
    image: minio/minio:latest
    hostname: minio
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    env_file:
      - .env
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - quantlytic-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio-mc:
    image: minio/mc:latest
    container_name: minio-mc
    depends_on:
      minio:
        condition: service_healthy
    env_file:
      - .env
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set ${MINIO_ALIAS_NAME} http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      /usr/bin/mc mb ${MINIO_ALIAS_NAME}/${MINIO_BUCKET_NAME} --ignore-existing;
      /usr/bin/mc policy set ${MINIO_BUCKET_POLICY} ${MINIO_ALIAS_NAME}/${MINIO_BUCKET_NAME};
      exit 0;
      "
    networks:
      - quantlytic-network

volumes:
  kafka-data:
    driver: local
  minio-data:
    driver: local

networks:
  quantlytic-network:
    driver: bridge