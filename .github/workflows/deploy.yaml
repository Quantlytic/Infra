name: Deploy Services to Minikube

on:
  push:
    branches:
      - main
    paths:
      - 'kafka/**'
      - 'minio/**'
      - 'timescaledb/**'
  
  workflow_dispatch:

jobs:
  deploy-kafka:
    if: "contains(github.event.head_commit.message, '[force deploy]') || contains(toJson(github.event.commits), 'kafka/')"
    name: Deploy Kafka
    runs-on: self-hosted
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Deploy Kafka Manifests
        run: kubectl apply -k kafka/


  manual-redeploy:
    # This 'if' ensures this job ONLY runs when you click the button
    if: github.event_name == 'workflow_dispatch'
    name: Manual Redeploy All Services
    runs-on: self-hosted
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Apply all manifests
        run: |
          echo "Starting manual full redeployment..."
          minikube kubectl --  apply -k kafka/
          # minikube kubectl -- apply -f minio/  <-- Uncomment when you add minio
          # minikube kubectl -- apply -f timescaledb/ <-- Uncomment when you add timescaledb