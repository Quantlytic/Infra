name: Deploy Services to Minikube

on:
  push:
    branches:
      - main
    paths:
      - 'kafka/**'
      - 'minio/**'
      - 'timescaledb/**'

  workflow_dispatch:

jobs:
  deploy-kafka:
    name: Deploy Kafka
    runs-on: self-hosted
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Deploy Kafka Manifests
        run: kubectl apply -k kafka/

  manual-redeploy:
    if: github.event_name == 'workflow_dispatch'
    name: Manual Redeploy All Services
    runs-on: self-hosted
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Apply all manifests
        run: |
          echo "Starting manual full redeployment..."
          minikube kubectl -- apply -k kafka/
