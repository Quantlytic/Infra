name: Deploy Services to Minikube

on:
  push:
    branches:
      - main
    paths:
      - 'kafka/**'
      - 'minio/**'

  workflow_dispatch:

jobs:
  # This job runs first to detect which service directories have changed
  changes:
    name: Detect File Changes
    runs-on: ubuntu-latest
    outputs:
      kafka: ${{ steps.filter.outputs.kafka }}
      minio: ${{ steps.filter.outputs.minio }}
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Use paths-filter action to identify changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            kafka:
              - 'kafka/**'
            minio:
              - 'minio/**'

  # This job only runs if Kafka files changed or on manual trigger
  deploy-kafka:
    name: Deploy Kafka
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.kafka == 'true'
    runs-on: self-hosted
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Deploy Kafka Manifests
        run: minikube kubectl -- apply -k kafka/

  # This new job only runs if MinIO files changed or on manual trigger
  deploy-minio:
    name: Deploy Minio
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.minio == 'true'
    runs-on: self-hosted
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      # - name: Deploy Minio Manifests
      #   run: minikube kubectl -- apply -k minio/